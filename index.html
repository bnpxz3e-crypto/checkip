<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ส่งตำแหน่งเครื่อง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: #111827;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 820px;
      background: #1f2937;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 24px;
    }

    .desc {
      color: #cbd5e1;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    pre {
      margin-top: 20px;
      background: #020617;
      padding: 18px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.65;
      overflow-x: auto;
      min-height: 240px;
      font-size: 14px;
    }

    .small {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>ตรวจสอบตำแหน่งเครื่อง</h1>

  <div class="desc">
    เมื่อกดปุ่ม ระบบจะขออนุญาตเข้าถึงตำแหน่ง GPS และส่งข้อมูลไปยังผู้ดูแล
  </div>

  <button id="btn" onclick="sendLocation()">
    กดเพื่อส่งตำแหน่งเครื่องนี้
  </button>

  <div class="small">
    GPS ต้องได้รับอนุญาตจากผู้ใช้ก่อนเท่านั้น ถ้าไม่อนุญาต ระบบจะส่งข้อความ error แทน
  </div>

  <pre id="result">ยังไม่มีข้อมูล</pre>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwV7r9NBRgW8JSMuh81mgseZO330J9sCacyuYuRYVKBW1MZkguRhF2IlhVToVK4T7YS9Q/exec";

const btn = document.getElementById("btn");
const result = document.getElementById("result");

function val(v) {
  if (v === null || v === undefined || v === "") return "-";
  return v;
}

function getBrowserName() {
  const ua = navigator.userAgent;

  if (ua.includes("Edg")) return "Microsoft Edge";
  if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
  if (ua.includes("Chrome")) return "Google Chrome";
  if (ua.includes("Firefox")) return "Firefox";
  if (ua.includes("Safari")) return "Safari";

  return "Unknown Browser";
}

function getDeviceName() {
  const ua = navigator.userAgent;

  if (/iPhone/i.test(ua)) return "iPhone";
  if (/iPad/i.test(ua)) return "iPad";
  if (/Android/i.test(ua)) return "Android";
  if (/Windows/i.test(ua)) return "Windows PC";
  if (/Macintosh|Mac OS/i.test(ua)) return "Mac";
  if (/Linux/i.test(ua)) return "Linux";

  return "Unknown Device";
}

function getBrowserTimezone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
  } catch {
    return "";
  }
}

async function fetchJson(url) {
  const res = await fetch(url, {
    cache: "no-store"
  });

  if (!res.ok) {
    throw new Error("HTTP " + res.status);
  }

  return await res.json();
}

function base64UrlEncode(str) {
  const utf8 = unescape(encodeURIComponent(str));
  const base64 = btoa(utf8);

  return base64
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/g, "");
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName =
      "jsonp_callback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 999999);

    window[callbackName] = function(data) {
      delete window[callbackName];
      script.remove();
      resolve(data);
    };

    const script = document.createElement("script");
    script.src = url + "&callback=" + callbackName;

    script.onerror = function() {
      delete window[callbackName];
      script.remove();
      reject(new Error("โหลดหรือส่งข้อมูลไม่สำเร็จ"));
    };

    document.body.appendChild(script);
  });
}

async function getGPS() {
  if (!navigator.geolocation) {
    return {
      latitude: "",
      longitude: "",
      accuracy: "",
      altitude: "",
      speed: "",
      heading: "",
      error: "เบราว์เซอร์นี้ไม่รองรับ GPS"
    };
  }

  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        resolve,
        reject,
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 0
        }
      );
    });

    return {
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude,
      accuracy: pos.coords.accuracy,
      altitude: pos.coords.altitude,
      speed: pos.coords.speed,
      heading: pos.coords.heading,
      error: ""
    };

  } catch (err) {
    let msg = "ไม่สามารถดึง GPS ได้";

    if (err.code === 1) {
      msg = "ผู้ใช้ไม่อนุญาต GPS";
    } else if (err.code === 2) {
      msg = "ไม่พบตำแหน่งของเครื่อง";
    } else if (err.code === 3) {
      msg = "ดึง GPS นานเกินไป หมดเวลา";
    }

    return {
      latitude: "",
      longitude: "",
      accuracy: "",
      altitude: "",
      speed: "",
      heading: "",
      error: msg
    };
  }
}

async function getIPInfo() {
  const errors = {};

  const apis = [
    {
      name: "ipapi.co",
      url: "https://ipapi.co/json/",
      map: function (d) {
        return {
          source_api: "ipapi.co",
          ip: d.ip || "",
          country_name: d.country_name || "",
          country_code: d.country_code || d.country || "",
          region: d.region || "",
          city: d.city || "",
          postal: d.postal || "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.org || "",
          asn: d.asn || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "ipwho.is",
      url: "https://ipwho.is/",
      map: function (d) {
        if (d.success === false) {
          throw new Error(d.message || "ipwho.is failed");
        }

        return {
          source_api: "ipwho.is",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country_code || "",
          region: d.region || "",
          city: d.city || "",
          postal: d.postal || "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.connection && d.connection.org ? d.connection.org : "",
          asn: d.connection && d.connection.asn ? d.connection.asn : "",
          timezone: d.timezone && d.timezone.id ? d.timezone.id : ""
        };
      }
    },
    {
      name: "ipinfo.io",
      url: "https://ipinfo.io/json",
      map: function (d) {
        let lat = "";
        let lon = "";

        if (d.loc && d.loc.includes(",")) {
          const parts = d.loc.split(",");
          lat = parts[0] || "";
          lon = parts[1] || "";
        }

        return {
          source_api: "ipinfo.io",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country || "",
          region: d.region || "",
          city: d.city || "",
          postal: d.postal || "",
          latitude: lat,
          longitude: lon,
          org: d.org || "",
          asn: d.org || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "geojs.io",
      url: "https://get.geojs.io/v1/ip/geo.json",
      map: function (d) {
        return {
          source_api: "geojs.io",
          ip: d.ip || "",
          country_name: d.country || "",
          country_code: d.country_code || "",
          region: d.region || "",
          city: d.city || "",
          postal: "",
          latitude: d.latitude || "",
          longitude: d.longitude || "",
          org: d.organization_name || "",
          asn: d.asn || "",
          timezone: d.timezone || ""
        };
      }
    },
    {
      name: "api.ipify.org",
      url: "https://api.ipify.org?format=json",
      map: function (d) {
        return {
          source_api: "api.ipify.org",
          ip: d.ip || "",
          country_name: "",
          country_code: "",
          region: "",
          city: "",
          postal: "",
          latitude: "",
          longitude: "",
          org: "",
          asn: "",
          timezone: "",
          note: "api.ipify.org แสดงได้แค่ IP ไม่มีประเทศ/เมือง"
        };
      }
    }
  ];

  for (const api of apis) {
    try {
      const raw = await fetchJson(api.url);
      return api.map(raw);
    } catch (e) {
      errors[api.name] = String(e);
    }
  }

  return {
    error: "ดึงข้อมูล IP ไม่สำเร็จทุก API",
    errors: errors
  };
}

function normalizeIP(ip) {
  return {
    ip: ip.ip || ip.query || "",
    country: ip.country_name || ip.country || "",
    country_code: ip.country_code || ip.country || "",
    region: ip.region || ip.regionName || "",
    city: ip.city || "",
    postal: ip.postal || ip.zip || "",
    latitude: ip.latitude || ip.lat || "",
    longitude: ip.longitude || ip.lon || "",
    org: ip.org || ip.isp || ip.organization_name || "",
    asn: ip.asn || "",
    timezone: typeof ip.timezone === "string" ? ip.timezone : "",
    source_api: ip.source_api || "",
    error: ip.error || "",
    note: ip.note || ""
  };
}

async function getAddressFromGPS(lat, lon) {
  if (!lat || !lon) {
    return {
      display_name: "",
      address: {},
      error: "ไม่มี GPS"
    };
  }

  try {
    const url =
      "https://nominatim.openstreetmap.org/reverse" +
      "?format=jsonv2" +
      "&lat=" + encodeURIComponent(lat) +
      "&lon=" + encodeURIComponent(lon) +
      "&zoom=18" +
      "&addressdetails=1" +
      "&accept-language=th";

    return await fetchJson(url);

  } catch (e) {
    return {
      display_name: "",
      address: {},
      error: "แปลง GPS เป็นที่อยู่ไม่สำเร็จ: " + String(e)
    };
  }
}

function normalizeAddress(addressData) {
  const a = addressData.address || {};

  return {
    full_address: addressData.display_name || "",
    country: a.country || "",
    province: a.state || a.province || "",
    district: a.county || a.city_district || a.district || a.municipality || "",
    subdistrict: a.suburb || a.subdistrict || a.village || a.town || a.hamlet || a.neighbourhood || "",
    postcode: a.postcode || ""
  };
}

async function postToAdmin(payload) {
  const payloadText = JSON.stringify(payload);
  const encoded = base64UrlEncode(payloadText);

  if (encoded.length > 7000) {
    throw new Error("ข้อมูลยาวเกินไป กรุณาลดข้อมูลที่ส่ง");
  }

  const url =
    SCRIPT_URL +
    "?action=save" +
    "&payload=" + encodeURIComponent(encoded);

  const res = await jsonp(url);

  if (!res.ok) {
    throw new Error(res.error || "Apps Script บันทึกไม่สำเร็จ");
  }

  return res;
}

async function sendLocation() {
  btn.disabled = true;
  btn.textContent = "กำลังส่งข้อมูล...";

  result.textContent =
    "กำลังขอ GPS...\n" +
    "ถ้ามีหน้าต่างขออนุญาต ให้กดอนุญาต\n\n" +
    "กรุณารอสักครู่...";

  const gps = await getGPS();

  result.textContent = "กำลังดึงข้อมูล IP / VPN...";

  const rawIP = await getIPInfo();
  const ip = normalizeIP(rawIP);

  result.textContent = "กำลังแปลงพิกัด GPS เป็นที่อยู่...";

  const rawAddress = await getAddressFromGPS(gps.latitude, gps.longitude);
  const addr = normalizeAddress(rawAddress);

  const googleMaps =
    gps.latitude && gps.longitude
      ? `https://www.google.com/maps?q=${gps.latitude},${gps.longitude}`
      : "-";

  const payload = {
    device_name: getDeviceName(),
    platform: navigator.platform || "",
    browser: getBrowserName(),
    user_agent: navigator.userAgent || "",
    language: navigator.language || "",
    screen: `${screen.width}x${screen.height}`,
    timezone_browser: getBrowserTimezone(),

    gps_latitude: gps.latitude || "",
    gps_longitude: gps.longitude || "",
    gps_accuracy: gps.accuracy ? gps.accuracy + " เมตร" : "",
    gps_altitude: gps.altitude || "",
    gps_speed: gps.speed || "",
    gps_heading: gps.heading || "",
    gps_error: gps.error || "",
    google_maps: googleMaps,

    full_address: addr.full_address || "",
    country_gps: addr.country || "",
    province_gps: addr.province || "",
    district_gps: addr.district || "",
    subdistrict_gps: addr.subdistrict || "",
    postcode_gps: addr.postcode || "",

    ip: ip.ip || "",
    ip_country: ip.country || "",
    ip_country_code: ip.country_code || "",
    ip_region: ip.region || "",
    ip_city: ip.city || "",
    ip_postal: ip.postal || "",
    ip_latitude: ip.latitude || "",
    ip_longitude: ip.longitude || "",
    ip_org: ip.org || "",
    ip_asn: ip.asn || "",
    ip_timezone: ip.timezone || "",
    ip_source_api: ip.source_api || "",
    ip_error: ip.error || "",
    ip_note: ip.note || "",

    sent_at: new Date().toLocaleString("th-TH")
  };

  result.textContent = `
====== ตำแหน่ง GPS จากเครื่อง ======
Latitude: ${val(gps.latitude)}
Longitude: ${val(gps.longitude)}
ความแม่นยำ: ${gps.accuracy ? gps.accuracy + " เมตร" : "-"}
Altitude: ${val(gps.altitude)}
Speed: ${val(gps.speed)}
Heading: ${val(gps.heading)}
Error: ${val(gps.error)}

Google Maps:
${googleMaps}


====== ข้อมูลเครื่อง ======
ชื่อเครื่องโดยประมาณ: ${val(payload.device_name)}
ระบบ: ${val(payload.platform)}
เบราว์เซอร์: ${val(payload.browser)}
ภาษาเครื่อง: ${val(payload.language)}
ขนาดจอ: ${val(payload.screen)}
Timezone Browser: ${val(payload.timezone_browser)}


====== ที่อยู่จาก GPS ======
ที่อยู่เต็ม: ${val(payload.full_address)}
ประเทศ: ${val(payload.country_gps)}
จังหวัด: ${val(payload.province_gps)}
อำเภอ: ${val(payload.district_gps)}
ตำบล: ${val(payload.subdistrict_gps)}
รหัสไปรษณีย์: ${val(payload.postcode_gps)}


====== ข้อมูล IP / VPN ======
API: ${val(payload.ip_source_api)}
IP: ${val(payload.ip)}
ประเทศ: ${val(payload.ip_country)}
รหัสประเทศ: ${val(payload.ip_country_code)}
จังหวัด/Region: ${val(payload.ip_region)}
เมือง: ${val(payload.ip_city)}
รหัสไปรษณีย์: ${val(payload.ip_postal)}
Latitude IP: ${val(payload.ip_latitude)}
Longitude IP: ${val(payload.ip_longitude)}
ผู้ให้บริการ: ${val(payload.ip_org)}
ASN: ${val(payload.ip_asn)}
Timezone: ${val(payload.ip_timezone)}
IP Error: ${val(payload.ip_error)}
หมายเหตุ IP: ${val(payload.ip_note)}


กำลังส่งข้อมูลไปยังแอดมิน...
`;

  try {
    const saveResult = await postToAdmin(payload);
    result.textContent += "\n\nส่งข้อมูลไปยังแอดมินแล้ว: " + saveResult.message;
  } catch (err) {
    result.textContent += "\n\nส่งข้อมูลไม่สำเร็จ: " + String(err);
  }

  btn.disabled = false;
  btn.textContent = "กดเพื่อส่งตำแหน่งเครื่องนี้";
}
</script>

</body>
</html>
