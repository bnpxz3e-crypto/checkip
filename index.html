<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ตรวจสอบตำแหน่งเครื่อง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: #0f172a;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      color: #86efac;
    }

    .desc {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 18px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 13px;
      border-radius: 12px;
      background: #020617;
      border: 1px solid #334155;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 14px;
    }

    .ok {
      color: #86efac;
      font-weight: bold;
    }

    .error {
      color: #fca5a5;
      font-weight: bold;
    }

    .result {
      margin-top: 16px;
      display: none;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
    }

    .item {
      margin-bottom: 14px;
    }

    .item:last-child {
      margin-bottom: 0;
    }

    .label {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .value {
      color: #ffffff;
      font-size: 17px;
      word-break: break-word;
    }

    @media (max-width: 650px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 18px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>ตรวจสอบตำแหน่งเครื่อง</h1>

  <div class="desc">
    เมื่อกดปุ่ม ระบบจะขออนุญาตเข้าถึงตำแหน่ง GPS จากเครื่องนี้<br>
    ข้อมูลจะถูกส่งไปยังผู้ดูแล
  </div>

  <button id="sendBtn" onclick="submitLocation()">
    กดเพื่อส่งตำแหน่งเครื่องนี้
  </button>

  <div id="status" class="status">
    พร้อมใช้งาน
  </div>

  <div id="result" class="result">
    <div class="item">
      <div class="label">ชื่อเครื่อง</div>
      <div id="deviceNameView" class="value">-</div>
    </div>

    <div class="item">
      <div class="label">IP</div>
      <div id="ipView" class="value">-</div>
    </div>

    <div class="item">
      <div class="label">ประเทศ IP</div>
      <div id="countryView" class="value">-</div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdJ26u1KPB-Nmu0CwAK3hw4p97uMvYWHhXJlh_uWye36AO2j4o7haHu3HXGfh08EKCcg/exec";

const sendBtn = document.getElementById("sendBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");

const deviceNameView = document.getElementById("deviceNameView");
const ipView = document.getElementById("ipView");
const countryView = document.getElementById("countryView");

async function submitLocation() {
  sendBtn.disabled = true;
  statusEl.innerHTML = "กำลังตรวจสอบข้อมูลเครื่อง...";

  const data = createBaseData();

  try {
    statusEl.innerHTML = "กำลังตรวจสอบ IP...";
    const ipData = await getIpInfo();
    Object.assign(data, ipData);
  } catch (err) {
    data.ip_error = String(err);
    data.ip_note = "ดึงข้อมูล IP ไม่สำเร็จ";
  }

  showSimpleResult(data);

  try {
    statusEl.innerHTML = "กำลังขออนุญาต GPS...";

    const gpsData = await getGpsInfo();
    Object.assign(data, gpsData);

    if (data.gps_latitude && data.gps_longitude) {
      try {
        const addressData = await reverseGeocode(data.gps_latitude, data.gps_longitude);
        Object.assign(data, addressData);
      } catch (addrErr) {
        data.full_address = "";
        data.country_gps = "";
        data.province_gps = "";
        data.district_gps = "";
        data.subdistrict_gps = "";
        data.postcode_gps = "";
      }
    }
  } catch (err) {
    data.gps_error = String(err);
  }

  data.sent_at = new Date().toLocaleString("th-TH", {
    timeZone: "Asia/Bangkok"
  });

  try {
    statusEl.innerHTML = "กำลังส่งข้อมูลไปยังผู้ดูแล...";
    await sendToSheet(data);

    statusEl.innerHTML = "<span class='ok'>ส่งข้อมูลสำเร็จ</span>";
  } catch (err) {
    statusEl.innerHTML =
      "<span class='error'>ส่งข้อมูลไม่สำเร็จ:</span> " + escapeHtml(String(err));
  }

  showSimpleResult(data);
  sendBtn.disabled = false;
}

function createBaseData() {
  return {
    device_name: getDeviceName(),
    platform: navigator.platform || "",
    browser: getBrowserName(),
    user_agent: navigator.userAgent || "",
    language: navigator.language || "",
    screen: window.screen.width + "x" + window.screen.height,
    timezone_browser: getBrowserTimezone(),

    gps_latitude: "",
    gps_longitude: "",
    gps_accuracy: "",
    gps_altitude: "",
    gps_speed: "",
    gps_heading: "",
    gps_error: "",
    google_maps: "",

    full_address: "",
    country_gps: "",
    province_gps: "",
    district_gps: "",
    subdistrict_gps: "",
    postcode_gps: "",

    ip: "",
    ip_country: "",
    ip_country_code: "",
    ip_region: "",
    ip_city: "",
    ip_postal: "",
    ip_latitude: "",
    ip_longitude: "",
    ip_org: "",
    ip_asn: "",
    ip_timezone: "",
    ip_source_api: "",
    ip_error: "",
    ip_note: "",

    sent_at: ""
  };
}

function getDeviceName() {
  const ua = navigator.userAgent || "";
  const platform = navigator.platform || "";

  if (/iPhone/i.test(ua)) return "iPhone";
  if (/iPad/i.test(ua)) return "iPad";
  if (/Android/i.test(ua)) return "Android Phone";
  if (/Win/i.test(platform)) return "Windows PC";
  if (/Mac/i.test(platform)) return "Mac";
  if (/Linux/i.test(platform)) return "Linux PC";

  return "Unknown Device";
}

function getBrowserName() {
  const ua = navigator.userAgent || "";

  if (ua.includes("Edg")) return "Microsoft Edge";
  if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
  if (ua.includes("Firefox")) return "Firefox";
  if (ua.includes("Chrome")) return "Google Chrome";
  if (ua.includes("Safari")) return "Safari";

  return "Unknown";
}

function getBrowserTimezone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
  } catch (e) {
    return "";
  }
}

function getGpsInfo() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({
        gps_error: "เบราว์เซอร์นี้ไม่รองรับ GPS"
      });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const coords = pos.coords;

        const lat = coords.latitude;
        const lng = coords.longitude;

        resolve({
          gps_latitude: lat,
          gps_longitude: lng,
          gps_accuracy: coords.accuracy ? Math.round(coords.accuracy) + " เมตร" : "",
          gps_altitude: coords.altitude || "",
          gps_speed: coords.speed || "",
          gps_heading: coords.heading || "",
          gps_error: "",
          google_maps: "https://www.google.com/maps?q=" + lat + "," + lng
        });
      },
      function(err) {
        let msg = "";

        if (err.code === 1) {
          msg = "ผู้ใช้ไม่อนุญาต GPS";
        } else if (err.code === 2) {
          msg = "ไม่สามารถระบุตำแหน่ง GPS ได้";
        } else if (err.code === 3) {
          msg = "GPS หมดเวลา";
        } else {
          msg = err.message || "GPS error";
        }

        resolve({
          gps_error: msg
        });
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  });
}

async function getIpInfo() {
  const result = {
    ip: "",
    ip_country: "",
    ip_country_code: "",
    ip_region: "",
    ip_city: "",
    ip_postal: "",
    ip_latitude: "",
    ip_longitude: "",
    ip_org: "",
    ip_asn: "",
    ip_timezone: "",
    ip_source_api: "",
    ip_error: "",
    ip_note: ""
  };

  try {
    const res = await fetch("https://ipapi.co/json/", {
      method: "GET",
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error("ipapi.co status " + res.status);
    }

    const data = await res.json();

    result.ip = data.ip || "";
    result.ip_country = data.country_name || "";
    result.ip_country_code = data.country_code || "";
    result.ip_region = data.region || "";
    result.ip_city = data.city || "";
    result.ip_postal = data.postal || "";
    result.ip_latitude = data.latitude || "";
    result.ip_longitude = data.longitude || "";
    result.ip_org = data.org || "";
    result.ip_asn = data.asn || "";
    result.ip_timezone = data.timezone || "";
    result.ip_source_api = "ipapi.co";

    return result;
  } catch (err1) {
    try {
      const res2 = await fetch("https://get.geojs.io/v1/ip/geo.json", {
        method: "GET",
        cache: "no-store"
      });

      if (!res2.ok) {
        throw new Error("geojs.io status " + res2.status);
      }

      const data2 = await res2.json();

      result.ip = data2.ip || "";
      result.ip_country = data2.country || "";
      result.ip_country_code = data2.country_code || "";
      result.ip_region = data2.region || "";
      result.ip_city = data2.city || "";
      result.ip_postal = "";
      result.ip_latitude = data2.latitude || "";
      result.ip_longitude = data2.longitude || "";
      result.ip_org = data2.organization_name || "";
      result.ip_asn = "";
      result.ip_timezone = data2.timezone || "";
      result.ip_source_api = "geojs.io";

      return result;
    } catch (err2) {
      result.ip_error = String(err2);
      result.ip_note = "ดึง IP ไม่สำเร็จทั้ง ipapi.co และ geojs.io";
      return result;
    }
  }
}

async function reverseGeocode(lat, lng) {
  const result = {
    full_address: "",
    country_gps: "",
    province_gps: "",
    district_gps: "",
    subdistrict_gps: "",
    postcode_gps: ""
  };

  const url =
    "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=" +
    encodeURIComponent(lat) +
    "&lon=" +
    encodeURIComponent(lng) +
    "&accept-language=th";

  const res = await fetch(url, {
    method: "GET",
    cache: "no-store"
  });

  if (!res.ok) {
    throw new Error("reverse geocode status " + res.status);
  }

  const data = await res.json();
  const addr = data.address || {};

  result.full_address = data.display_name || "";
  result.country_gps = addr.country || "";
  result.province_gps = addr.province || addr.state || "";
  result.district_gps =
    addr.city ||
    addr.town ||
    addr.municipality ||
    addr.county ||
    addr.district ||
    "";
  result.subdistrict_gps =
    addr.suburb ||
    addr.village ||
    addr.hamlet ||
    addr.quarter ||
    addr.neighbourhood ||
    "";
  result.postcode_gps = addr.postcode || "";

  return result;
}

function encodePayload(obj) {
  const json = JSON.stringify(obj);
  return btoa(unescape(encodeURIComponent(json)));
}

async function sendToSheet(data) {
  const payload = encodePayload(data);
  const body = "payload=" + encodeURIComponent(payload);

  if (navigator.sendBeacon) {
    const blob = new Blob([body], {
      type: "application/x-www-form-urlencoded;charset=UTF-8"
    });

    const ok = navigator.sendBeacon(SCRIPT_URL, blob);

    if (ok) {
      return true;
    }
  }

  await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
    },
    body: body
  });

  return true;
}

function showSimpleResult(data) {
  resultEl.style.display = "block";

  deviceNameView.textContent = data.device_name || "-";
  ipView.textContent = data.ip || "-";
  countryView.textContent = data.ip_country || "-";
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
