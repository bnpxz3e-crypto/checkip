<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - รายงานตำแหน่ง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: #0f172a;
      color: #ffffff;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .login-page {
      min-height: calc(100vh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    }

    .login-box h1 {
      text-align: center;
      color: #86efac;
      margin-bottom: 8px;
      font-size: 25px;
    }

    .login-subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 22px;
      font-size: 14px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: #cbd5e1;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }

    .login-error {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.55);
      color: #fca5a5;
      padding: 11px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .login-btn {
      width: 100%;
      margin-top: 4px;
      padding: 13px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .login-btn:hover {
      background: #16a34a;
    }

    .admin-page {
      display: none;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .admin-header h1 {
      margin: 0;
    }

    .login-info {
      color: #cbd5e1;
      font-size: 14px;
    }

    .top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .danger {
      background: #ef4444;
    }

    .danger:hover {
      background: #dc2626;
    }

    .logout {
      background: #64748b;
    }

    .logout:hover {
      background: #475569;
    }

    .status {
      margin-bottom: 16px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #86efac;
    }

    .grid {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .label {
      color: #cbd5e1;
      font-weight: bold;
    }

    a {
      color: #38bdf8;
      word-break: break-all;
    }

    pre {
      background: #020617;
      color: #ffffff;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin-top: 12px;
      font-size: 12px;
      max-height: 260px;
    }

    .badge-ok {
      color: #86efac;
      font-weight: bold;
    }

    .badge-error {
      color: #fca5a5;
      font-weight: bold;
    }

    .small-note {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 14px;
      text-align: center;
    }

    @media (max-width: 650px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 22px;
      }

      .login-box {
        padding: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .label {
        margin-top: 8px;
      }

      .top button {
        width: 100%;
      }

      .admin-header {
        display: block;
      }

      .login-info {
        margin-top: 6px;
      }
    }
  </style>
</head>

<body>

<!-- หน้า Login -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>เข้าสู่ระบบแอดมิน</h1>
    <div class="login-subtitle">
      กรอก Username และ Password<br>
      เพื่อดูรายงานตำแหน่ง
    </div>

    <div id="loginError" class="login-error">
      Username หรือ Password ไม่ถูกต้อง
    </div>

    <div class="form-group">
      <label for="usernameInput">Username</label>
      <input
        id="usernameInput"
        type="text"
        placeholder="กรอก username"
        autocomplete="username"
      >
    </div>

    <div class="form-group">
      <label for="passwordInput">Password</label>
      <input
        id="passwordInput"
        type="password"
        placeholder="กรอก password"
        autocomplete="current-password"
      >
    </div>

    <button class="login-btn" onclick="login()">เข้าสู่ระบบ</button>

    <div class="small-note">
      ค่าเริ่มต้น: admin / 123456
    </div>
  </div>
</div>

<!-- หน้า Admin -->
<div id="adminPage" class="admin-page">
  <div class="admin-header">
    <h1>Admin - รายงานตำแหน่ง</h1>
    <div id="loginInfo" class="login-info"></div>
  </div>

  <div class="top">
    <button onclick="loadData()">โหลดข้อมูล</button>
    <button class="danger" onclick="clearData()">ล้างข้อมูลทั้งหมด</button>
    <button class="logout" onclick="logout()">ออกจากระบบ</button>
  </div>

  <div id="status" class="status">กดโหลดข้อมูลเพื่อดูรายการ</div>
  <div id="list"></div>
</div>

<script>
/*
  ==============================
  ตั้งค่าหลัก
  ==============================
*/

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvu4JqhFIihrd3PfvmF98wUUgJF2MRr99Qi--bZ-0NP5NKrl-BuW5q0VLVu4LjHI10Mw/exec";

const ADMIN_KEY = "123456";

const LOGIN_USERNAME = "admin";
const LOGIN_PASSWORD = "1560";

const LOGIN_STORAGE_KEY = "admin_location_logged_in";
const LOGIN_USER_KEY = "admin_location_username";

/*
  ==============================
  ตัวแปร DOM
  ==============================
*/

const loginPage = document.getElementById("loginPage");
const adminPage = document.getElementById("adminPage");
const loginError = document.getElementById("loginError");
const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");
const loginInfo = document.getElementById("loginInfo");

const statusEl = document.getElementById("status");
const listEl = document.getElementById("list");

/*
  ==============================
  ระบบ Login
  ==============================
*/

function checkLogin() {
  const loggedIn = localStorage.getItem(LOGIN_STORAGE_KEY);
  const username = localStorage.getItem(LOGIN_USER_KEY);

  if (loggedIn === "yes") {
    showAdmin(username || LOGIN_USERNAME);
  } else {
    showLogin();
  }
}

function showLogin() {
  loginPage.style.display = "flex";
  adminPage.style.display = "none";

  setTimeout(() => {
    usernameInput.focus();
  }, 100);
}

function showAdmin(username) {
  loginPage.style.display = "none";
  adminPage.style.display = "block";
  loginInfo.textContent = "เข้าสู่ระบบ: " + username;
}

function login() {
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();

  if (username === LOGIN_USERNAME && password === LOGIN_PASSWORD) {
    localStorage.setItem(LOGIN_STORAGE_KEY, "yes");
    localStorage.setItem(LOGIN_USER_KEY, username);

    loginError.style.display = "none";
    usernameInput.value = "";
    passwordInput.value = "";

    showAdmin(username);
  } else {
    loginError.style.display = "block";
    passwordInput.value = "";
    passwordInput.focus();
  }
}

function logout() {
  localStorage.removeItem(LOGIN_STORAGE_KEY);
  localStorage.removeItem(LOGIN_USER_KEY);

  listEl.innerHTML = "";
  statusEl.textContent = "กดโหลดข้อมูลเพื่อดูรายการ";

  showLogin();
}

usernameInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    passwordInput.focus();
  }
});

passwordInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    login();
  }
});

/*
  ==============================
  Helper
  ==============================
*/

function val(v) {
  if (v === null || v === undefined || v === "") return "-";
  return v;
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatValue(v) {
  if (v === null || v === undefined || v === "") return "-";

  if (typeof v === "string" && /^\d{4}-\d{2}-\d{2}T/.test(v)) {
    const d = new Date(v);
    if (!isNaN(d.getTime())) {
      return d.toLocaleString("th-TH", {
        timeZone: "Asia/Bangkok",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }
  }

  return v;
}

/*
  ==============================
  JSONP สำหรับโหลดข้อมูลจาก Apps Script
  ==============================
*/

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName =
      "jsonp_admin_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 999999);

    const separator = url.includes("?") ? "&" : "?";
    const finalUrl = url + separator + "callback=" + encodeURIComponent(callbackName);

    const script = document.createElement("script");

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("หมดเวลาโหลดข้อมูล หรือ Apps Script ไม่ได้ตอบกลับแบบ JSONP"));
    }, 15000);

    function cleanup() {
      clearTimeout(timer);

      try {
        delete window[callbackName];
      } catch (e) {
        window[callbackName] = undefined;
      }

      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }
    }

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.src = finalUrl;
    script.async = true;

    script.onerror = function() {
      cleanup();
      reject(new Error("โหลด URL Apps Script ไม่สำเร็จ ตรวจสอบ Deploy / Anyone access / SCRIPT_URL"));
    };

    document.body.appendChild(script);
  });
}

/*
  ==============================
  โหลดข้อมูล
  ==============================
*/

async function loadData() {
  statusEl.textContent = "กำลังโหลดข้อมูล...";
  listEl.innerHTML = "";

  const url =
    SCRIPT_URL +
    "?action=list" +
    "&key=" + encodeURIComponent(ADMIN_KEY);

  try {
    const data = await jsonp(url);

    if (!data.ok) {
      statusEl.innerHTML =
        "<span class='badge-error'>" +
        escapeHtml(data.error || "โหลดข้อมูลไม่สำเร็จ") +
        "</span>";
      return;
    }

    const rows = data.rows || [];

    statusEl.innerHTML =
      "<span class='badge-ok'>โหลดสำเร็จ</span> พบข้อมูลทั้งหมด " +
      rows.length +
      " รายการ";

    if (rows.length === 0) {
      listEl.innerHTML = "<div class='card'>ยังไม่มีข้อมูล</div>";
      return;
    }

    listEl.innerHTML = rows.map((row, index) => renderCard(row, index)).join("");

  } catch (err) {
    statusEl.innerHTML =
      "<span class='badge-error'>โหลดข้อมูลไม่สำเร็จ:</span> " +
      escapeHtml(String(err));
  }
}

/*
  ==============================
  ล้างข้อมูล
  ==============================
*/

async function clearData() {
  const ok = confirm("ต้องการล้างข้อมูลทั้งหมดจริงไหม?");
  if (!ok) return;

  statusEl.textContent = "กำลังล้างข้อมูล...";

  const url =
    SCRIPT_URL +
    "?action=clear" +
    "&key=" + encodeURIComponent(ADMIN_KEY);

  try {
    const data = await jsonp(url);

    if (!data.ok) {
      statusEl.innerHTML =
        "<span class='badge-error'>" +
        escapeHtml(data.error || "ล้างข้อมูลไม่สำเร็จ") +
        "</span>";
      return;
    }

    statusEl.innerHTML =
      "<span class='badge-ok'>" +
      escapeHtml(data.message || "ล้างข้อมูลแล้ว") +
      "</span>";

    listEl.innerHTML = "";

  } catch (err) {
    statusEl.innerHTML =
      "<span class='badge-error'>ล้างข้อมูลไม่สำเร็จ:</span> " +
      escapeHtml(String(err));
  }
}

/*
  ==============================
  แสดงรายการ
  ==============================
*/

function renderCard(row, index) {
  const maps = row["Google Maps"] || "";
  const jsonText = row["ข้อมูลทั้งหมด JSON"] || "";

  return `
    <div class="card">
      <h2>#${index + 1} ${escapeHtml(formatValue(row["ชื่อเครื่อง"]) || "-")}</h2>

      <div class="grid">
        <div class="label">เวลา</div>
        <div>${escapeHtml(formatValue(row["เวลา"]))}</div>

        <div class="label">ระบบ</div>
        <div>${escapeHtml(formatValue(row["ระบบ"]))}</div>

        <div class="label">เบราว์เซอร์</div>
        <div>${escapeHtml(formatValue(row["เบราว์เซอร์"]))}</div>

        <div class="label">User Agent</div>
        <div>${escapeHtml(formatValue(row["User Agent"]))}</div>

        <div class="label">ภาษาเครื่อง</div>
        <div>${escapeHtml(formatValue(row["ภาษาเครื่อง"]))}</div>

        <div class="label">ขนาดจอ</div>
        <div>${escapeHtml(formatValue(row["ขนาดจอ"]))}</div>

        <div class="label">Timezone Browser</div>
        <div>${escapeHtml(formatValue(row["Timezone Browser"]))}</div>

        <div class="label">GPS Latitude</div>
        <div>${escapeHtml(formatValue(row["GPS Latitude"]))}</div>

        <div class="label">GPS Longitude</div>
        <div>${escapeHtml(formatValue(row["GPS Longitude"]))}</div>

        <div class="label">ความแม่นยำ</div>
        <div>${escapeHtml(formatValue(row["ความแม่นยำ"]))}</div>

        <div class="label">Altitude</div>
        <div>${escapeHtml(formatValue(row["Altitude"]))}</div>

        <div class="label">Speed</div>
        <div>${escapeHtml(formatValue(row["Speed"]))}</div>

        <div class="label">Heading</div>
        <div>${escapeHtml(formatValue(row["Heading"]))}</div>

        <div class="label">GPS Error</div>
        <div>${escapeHtml(formatValue(row["GPS Error"]))}</div>

        <div class="label">Google Maps</div>
        <div>
          ${
            maps && maps !== "-"
              ? `<a href="${escapeHtml(maps)}" target="_blank">เปิดแผนที่</a>`
              : "-"
          }
        </div>

        <div class="label">ที่อยู่เต็มจาก GPS</div>
        <div>${escapeHtml(formatValue(row["ที่อยู่เต็มจาก GPS"]))}</div>

        <div class="label">ประเทศ GPS</div>
        <div>${escapeHtml(formatValue(row["ประเทศ GPS"]))}</div>

        <div class="label">จังหวัด GPS</div>
        <div>${escapeHtml(formatValue(row["จังหวัด GPS"]))}</div>

        <div class="label">อำเภอ GPS</div>
        <div>${escapeHtml(formatValue(row["อำเภอ GPS"]))}</div>

        <div class="label">ตำบล GPS</div>
        <div>${escapeHtml(formatValue(row["ตำบล GPS"]))}</div>

        <div class="label">รหัสไปรษณีย์ GPS</div>
        <div>${escapeHtml(formatValue(row["รหัสไปรษณีย์ GPS"]))}</div>

        <div class="label">IP</div>
        <div>${escapeHtml(formatValue(row["IP"]))}</div>

        <div class="label">ประเทศ IP</div>
        <div>${escapeHtml(formatValue(row["ประเทศ IP"]))}</div>

        <div class="label">รหัสประเทศ IP</div>
        <div>${escapeHtml(formatValue(row["รหัสประเทศ IP"]))}</div>

        <div class="label">จังหวัด IP</div>
        <div>${escapeHtml(formatValue(row["จังหวัด/Region IP"]))}</div>

        <div class="label">เมือง IP</div>
        <div>${escapeHtml(formatValue(row["เมือง IP"]))}</div>

        <div class="label">รหัสไปรษณีย์ IP</div>
        <div>${escapeHtml(formatValue(row["รหัสไปรษณีย์ IP"]))}</div>

        <div class="label">Latitude IP</div>
        <div>${escapeHtml(formatValue(row["Latitude IP"]))}</div>

        <div class="label">Longitude IP</div>
        <div>${escapeHtml(formatValue(row["Longitude IP"]))}</div>

        <div class="label">ผู้ให้บริการ IP</div>
        <div>${escapeHtml(formatValue(row["ผู้ให้บริการ IP"]))}</div>

        <div class="label">ASN IP</div>
        <div>${escapeHtml(formatValue(row["ASN IP"]))}</div>

        <div class="label">Timezone IP</div>
        <div>${escapeHtml(formatValue(row["Timezone IP"]))}</div>

        <div class="label">IP API</div>
        <div>${escapeHtml(formatValue(row["IP API"]))}</div>

        <div class="label">IP Error</div>
        <div>${escapeHtml(formatValue(row["IP Error"]))}</div>

        <div class="label">IP Note</div>
        <div>${escapeHtml(formatValue(row["IP Note"]))}</div>

        <div class="label">เวลาที่ส่งจากเครื่อง</div>
        <div>${escapeHtml(formatValue(row["เวลาที่ส่งจากเครื่อง"]))}</div>
      </div>

      <pre>${escapeHtml(jsonText)}</pre>
    </div>
  `;
}

// เริ่มทำงาน
checkLogin();
</script>

</body>
</html>
