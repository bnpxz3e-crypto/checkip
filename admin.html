<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - รายงานตำแหน่ง</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: #0f172a;
      color: #ffffff;
      padding: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 26px;
    }

    .top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .danger {
      background: #ef4444;
    }

    .danger:hover {
      background: #dc2626;
    }

    .status {
      margin-bottom: 16px;
      color: #cbd5e1;
      background: #020617;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #86efac;
    }

    .row {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      color: #cbd5e1;
      font-weight: bold;
    }

    .value {
      color: #ffffff;
      word-break: break-word;
    }

    a {
      color: #93c5fd;
    }

    .empty {
      color: #fbbf24;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 3px;
      }

      h1 {
        font-size: 22px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<h1>Admin - รายงานตำแหน่ง</h1>

<div class="top">
  <button onclick="loadData()">โหลดข้อมูล</button>
  <button class="danger" onclick="clearData()">ล้างข้อมูลทั้งหมด</button>
</div>

<div id="status" class="status">พร้อมใช้งาน</div>

<div id="list" class="grid"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzU3eYKkKfd6pxV4q0Asx2mLRsoRZxe60Er_33fnD9wFk4obVDqqbooKsf6irVUssHz/exec";
const ADMIN_KEY = "123456";

const statusEl = document.getElementById("status");
const listEl = document.getElementById("list");

window.addEventListener("load", function() {
  loadData();
});

function loadData() {
  statusEl.textContent = "กำลังโหลดข้อมูล...";
  listEl.innerHTML = "";

  callScript("list")
    .then(function(res) {
      if (!res || res.ok !== true) {
        throw new Error(res && res.error ? res.error : "โหลดข้อมูลไม่สำเร็จ");
      }

      renderRows(res.rows || []);
      statusEl.textContent = "พบข้อมูล " + (res.rows || []).length + " รายการ";
    })
    .catch(function(err) {
      statusEl.textContent = "โหลดข้อมูลไม่สำเร็จ: " + String(err);
    });
}

function clearData() {
  const ok = confirm("ต้องการล้างข้อมูลทั้งหมดใช่ไหม?");

  if (!ok) return;

  statusEl.textContent = "กำลังล้างข้อมูล...";

  callScript("clear")
    .then(function(res) {
      if (!res || res.ok !== true) {
        throw new Error(res && res.error ? res.error : "ล้างข้อมูลไม่สำเร็จ");
      }

      statusEl.textContent = "ล้างข้อมูลทั้งหมดแล้ว";
      loadData();
    })
    .catch(function(err) {
      statusEl.textContent = "ล้างข้อมูลไม่สำเร็จ: " + String(err);
    });
}

function callScript(action) {
  return new Promise(function(resolve, reject) {
    const callbackName =
      "adminCallback_" +
      Date.now() +
      "_" +
      Math.floor(Math.random() * 999999);

    const url =
      SCRIPT_URL +
      "?action=" + encodeURIComponent(action) +
      "&key=" + encodeURIComponent(ADMIN_KEY) +
      "&callback=" + encodeURIComponent(callbackName) +
      "&_=" + Date.now();

    const script = document.createElement("script");

    const timer = setTimeout(function() {
      cleanup();
      reject(new Error("โหลด Apps Script หมดเวลา"));
    }, 20000);

    window[callbackName] = function(result) {
      cleanup();
      resolve(result);
    };

    script.onerror = function() {
      cleanup();
      reject(new Error("โหลด Apps Script ไม่สำเร็จ"));
    };

    function cleanup() {
      clearTimeout(timer);

      if (script.parentNode) {
        script.parentNode.removeChild(script);
      }

      try {
        delete window[callbackName];
      } catch (e) {
        window[callbackName] = undefined;
      }
    }

    script.src = url;
    document.body.appendChild(script);
  });
}

function renderRows(rows) {
  listEl.innerHTML = "";

  if (!rows || rows.length === 0) {
    listEl.innerHTML = "<div class='empty'>ยังไม่มีข้อมูล</div>";
    return;
  }

  rows.forEach(function(row, index) {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("h2");
    title.textContent = "#" + (index + 1) + " - " + safeText(row["ชื่อเครื่อง"] || "-");
    card.appendChild(title);

    addRow(card, "เวลา", row["เวลา"]);
    addRow(card, "ชื่อเครื่อง", row["ชื่อเครื่อง"]);
    addRow(card, "ระบบ", row["ระบบ"]);
    addRow(card, "เบราว์เซอร์", row["เบราว์เซอร์"]);
    addRow(card, "ภาษาเครื่อง", row["ภาษาเครื่อง"]);
    addRow(card, "ขนาดจอ", row["ขนาดจอ"]);
    addRow(card, "Timezone Browser", row["Timezone Browser"]);

    addRow(card, "GPS Latitude", row["GPS Latitude"]);
    addRow(card, "GPS Longitude", row["GPS Longitude"]);
    addRow(card, "ความแม่นยำ", row["ความแม่นยำ"]);
    addRow(card, "Altitude", row["Altitude"]);
    addRow(card, "Speed", row["Speed"]);
    addRow(card, "Heading", row["Heading"]);
    addRow(card, "GPS Error", row["GPS Error"]);

    addMapRow(card, "Google Maps", row["Google Maps"]);

    addRow(card, "ที่อยู่ GPS", row["ที่อยู่เต็มจาก GPS"]);
    addRow(card, "ประเทศ GPS", row["ประเทศ GPS"]);
    addRow(card, "จังหวัด GPS", row["จังหวัด GPS"]);
    addRow(card, "อำเภอ GPS", row["อำเภอ GPS"]);
    addRow(card, "ตำบล GPS", row["ตำบล GPS"]);
    addRow(card, "รหัสไปรษณีย์ GPS", row["รหัสไปรษณีย์ GPS"]);

    addRow(card, "IP", row["IP"]);
    addRow(card, "ประเทศ IP", row["ประเทศ IP"]);
    addRow(card, "รหัสประเทศ IP", row["รหัสประเทศ IP"]);
    addRow(card, "จังหวัด/Region IP", row["จังหวัด/Region IP"]);
    addRow(card, "เมือง IP", row["เมือง IP"]);
    addRow(card, "รหัสไปรษณีย์ IP", row["รหัสไปรษณีย์ IP"]);
    addRow(card, "Latitude IP", row["Latitude IP"]);
    addRow(card, "Longitude IP", row["Longitude IP"]);
    addRow(card, "ผู้ให้บริการ IP", row["ผู้ให้บริการ IP"]);
    addRow(card, "ASN IP", row["ASN IP"]);
    addRow(card, "Timezone IP", row["Timezone IP"]);
    addRow(card, "IP API", row["IP API"]);
    addRow(card, "IP Error", row["IP Error"]);
    addRow(card, "IP Note", row["IP Note"]);

    addRow(card, "เวลาที่ส่งจากเครื่อง", row["เวลาที่ส่งจากเครื่อง"]);
    addRow(card, "User Agent", row["User Agent"]);

    listEl.appendChild(card);
  });
}

function addRow(card, label, value) {
  const div = document.createElement("div");
  div.className = "row";

  const labelDiv = document.createElement("div");
  labelDiv.className = "label";
  labelDiv.textContent = label;

  const valueDiv = document.createElement("div");
  valueDiv.className = "value";
  valueDiv.textContent = value || "-";

  div.appendChild(labelDiv);
  div.appendChild(valueDiv);

  card.appendChild(div);
}

function addMapRow(card, label, value) {
  const div = document.createElement("div");
  div.className = "row";

  const labelDiv = document.createElement("div");
  labelDiv.className = "label";
  labelDiv.textContent = label;

  const valueDiv = document.createElement("div");
  valueDiv.className = "value";

  if (value && String(value).startsWith("http")) {
    const a = document.createElement("a");
    a.href = value;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = "เปิด Google Maps";
    valueDiv.appendChild(a);
  } else {
    valueDiv.textContent = value || "-";
  }

  div.appendChild(labelDiv);
  div.appendChild(valueDiv);

  card.appendChild(div);
}

function safeText(text) {
  return String(text || "");
}
</script>

</body>
</html>
